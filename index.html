<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; }
        .glass-btn {
            background: rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }
        .glow-accent {
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
        }
    </style>
</head>
<body class="text-white overflow-hidden">

    <section class="relative h-screen w-full flex items-center justify-center overflow-hidden">
        
        <div class="absolute -top-24 -right-24 w-96 h-96 glow-accent rounded-full blur-3xl"></div>
        
        <div class="relative z-10 px-6 text-center max-w-4xl mx-auto">
            
            <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter mb-6 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-400">
                Victoria Adenola
            </h1>

            <p class="text-lg md:text-xl text-white/90 font-medium mb-10 max-w-2xl mx-auto leading-relaxed">
                Product Designer & Full-Stack Developer specializing in <span class="text-[#8b5cf6]">high-conversion UI/UX</span> and Web3 interfaces.
            </p>

            <div class="flex justify-center">
                <button class="glass-btn px-8 py-4 rounded-full text-white font-semibold text-lg transition-all duration-300 transform hover:scale-105 hover:shadow-[0_0_30px_rgba(139,92,246,0.4)] active:scale-95 group">
                    View My Projects
                    <span class="inline-block ml-2 transition-transform duration-300 group-hover:translate-x-1">→</span>
                </button>
            </div>
            
        </div>

        <div class="absolute -bottom-48 -left-24 w-[500px] h-[500px] glow-accent rounded-full blur-[100px] opacity-50"></div>

    </section>

</body>
</html>
